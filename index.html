<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم سوبر ماركت</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="/46271.jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="dashboard-container" id="hide">
    <aside class="sidebar">
      <div class="logo">
        <i class="fas fa-leaf"></i>
        <span>فريش ماركت</span>
      </div>
      <nav>
        <a href="index.html" class="active"><i class="fas fa-th-large"></i> الرئيسية</a>
        <a href="pro.html"><i class="fas fa-box"></i> المنتجات</a>
        <a href="bills.html"><i class="fas fa-clipboard-list"></i> الكاشير</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="search" placeholder="ابحث عن منتج أو طلب..." onkeyup="searchProduct()" />
        </div>
        <div class="header-actions">
          <div class="notification">
          </div>
        </div>
      </header>

      <section class="stats-container">
        <div class="stat-card">
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">
            <i class="fas fa-truck-loading"></i>
          </div>
          <div class="stat-info">
            <p>عدد المنتجات</p>
            <h3 class="no_pro">0</h3>
          </div>
        </div>
      </section>

      <section class="recent-orders">
        <div class="section-header">
          <h2>العمليات الأخيرة</h2>
          <button class="btnviewall">
            <a href="pro.html"> عرض الكل </a>
          </button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>المنتج</th>
                <th>الكمية</th>
                <th>السعر</th>
              </tr>
            </thead>
            <tbody id="tableBody1"></tbody>
          </table>
        </div>
    </main>
  </div>
  <script src="home.js"></script>
</body>

</html>
